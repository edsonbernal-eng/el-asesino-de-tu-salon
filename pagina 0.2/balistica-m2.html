<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Balística m2 | El Asesino De Tu Carrera</title>
    <link rel="stylesheet" href="" />
    <link rel="icon" type="image/jpeg" href="img/logo.jpeg">
</head>

<body>
    <style>
        button {
            padding: 10px;
            font-size: 16px;
            background-color: #ff6a6ac9;
            color: rgb(255, 255, 255);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
            margin-right: 20px;
        }
        
        button:hover {
            background-color: #f82121c7;
        }
        
        .fondo {
            width: 100vw;
            /* 100% del ancho de la ventana */
            height: 100vh;
            /* 100% de la altura de la ventana */
            object-fit: cover;
            /* Ajusta la imagen sin deformarla (la recorta si es necesario) */
            position: fixed;
            /* La mantiene fija para que no se mueva al hacer scroll */
            top: 0;
            left: 0;
            z-index: -1;
            /* La coloca al fondo por si decides poner texto encima */
        }
    </style>


    <header>
        <form action="temario.html"> <button> Regresar al Temario</button>
        </form>
    </header>


    <img src="img/construyendo.png" alt="construccion" class="fondo">

</body>

</html>
